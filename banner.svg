<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">

  <!-- Background -->
  <rect width="800" height="160" fill="#1DB954"/>

  <!-- Dark squircle icon: 100x100 at (30,30) -->
  <rect x="30" y="30" width="100" height="100" rx="22" ry="22" fill="#0D0D0D"/>

  <!--
    Waveform bars — vertically centred inside icon.
    Icon centre Y = 30 + 50 = 80.
    Bar width = 10px, gap = 5px, 5 bars → total width = 5*10 + 4*5 = 70px.
    Start X = icon centre (80) - 70/2 = 45.
    Heights (px): [40, 60, 88, 60, 40] — centred at Y=80.
    Bar Y = 80 - height/2.
  -->

  <!-- Bar 1 outer left: h=40, y=60 -->
  <rect x="45" y="60" width="10" height="40" rx="5" ry="5" fill="#0d8c3a"/>
  <!-- Bar 2 inner left: h=60, y=50 -->
  <rect x="60" y="50" width="10" height="60" rx="5" ry="5" fill="#13a344"/>
  <!-- Bar 3 centre tallest: h=88, y=36 -->
  <rect x="75" y="36" width="10" height="88" rx="5" ry="5" fill="#1DB954"/>
  <!-- Bar 4 inner right: h=60, y=50 -->
  <rect x="90" y="50" width="10" height="60" rx="5" ry="5" fill="#13a344"/>
  <!-- Bar 5 outer right: h=40, y=60 -->
  <rect x="105" y="60" width="10" height="40" rx="5" ry="5" fill="#0d8c3a"/>

  <!-- Name -->
  <text
    x="156"
    y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="700"
    fill="#0D0D0D"
  >Gabriel Green</text>

  <!-- Tagline -->
  <text
    x="158"
    y="112"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-style="italic"
    fill="#0D0D0D"
  >Audio Engineer · AI Voice Synthesis · Creative Production Manager</text>

</svg>
