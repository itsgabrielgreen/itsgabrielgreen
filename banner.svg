<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">

  <!-- Background -->
  <rect width="800" height="160" fill="#1DB954"/>

  <!-- Tiled watermark: GABRIEL GREEN repeated, very subtle -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900" fill="#0D0D0D" opacity="0.07">
    <text x="-20"  y="58">GABRIEL</text>
    <text x="155"  y="58">GREEN</text>
    <text x="355"  y="58">GABRIEL</text>
    <text x="530"  y="58">GREEN</text>
    <text x="700"  y="58">GABRIEL</text>
    <text x="-20"  y="120">GREEN</text>
    <text x="155"  y="120">GABRIEL</text>
    <text x="355"  y="120">GREEN</text>
    <text x="530"  y="120">GABRIEL</text>
    <text x="700"  y="120">GREEN</text>
  </g>

  <!-- Squircle icon: 52x52 at top-left -->
  <rect x="20" y="18" width="52" height="52" rx="12" ry="12" fill="#0D0D0D"/>

  <!--
    Waveform bars — vertically centred in icon.
    Icon centre: x=46, y=44.
    5 bars, bar_w=5, gap=3 → total=5*5+4*3=37px → start_x=46-18.5=27.5
    Heights: [0.45*40=18, 0.68*40=27, 1.00*40=40, 0.68*40=27, 0.45*40=18]
    Bar Y = icon_cy - height/2 = 44 - h/2
  -->
  <!-- Bar 1 outer: h=18, y=35 -->
  <rect x="28" y="35" width="5" height="18" rx="2.5" fill="#0d8c3a"/>
  <!-- Bar 2 inner: h=27, y=30.5 -->
  <rect x="36" y="31" width="5" height="27" rx="2.5" fill="#13a344"/>
  <!-- Bar 3 centre: h=40, y=24 -->
  <rect x="44" y="24" width="5" height="40" rx="2.5" fill="#1DB954"/>
  <!-- Bar 4 inner: h=27, y=30.5 -->
  <rect x="52" y="31" width="5" height="27" rx="2.5" fill="#13a344"/>
  <!-- Bar 5 outer: h=18, y=35 -->
  <rect x="60" y="35" width="5" height="18" rx="2.5" fill="#0d8c3a"/>

  <!-- "Gabriel Green" name — top left beside icon -->
  <text
    x="84"
    y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#0D0D0D"
  >Gabriel Green</text>

  <!-- Large centred bold/italic tagline — like LinkedIn banner -->
  <text
    x="400"
    y="122"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    fill="#0D0D0D"
  >Audio Engineer &amp; <tspan font-style="italic">AI Voice Specialist</tspan></text>

</svg>
